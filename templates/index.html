{% extends "base.html" %}
{% block title %}İstanbul Ofis Arama | OfisArama v2{% endblock %}

{% block content %}

<!-- Hero -->
<div class="text-center mb-10">
  <h1 class="text-4xl font-bold mb-2">İstanbul Ofis Veritabanı</h1>
  <p class="text-slate-400">{{ total }} ofis binası &mdash; arama, filtreleme, karşılaştırma</p>
</div>

<!-- Search bar -->
<div class="bg-slate-900 border border-slate-700 rounded-2xl p-5 mb-8 shadow-lg">
  <div class="flex flex-col md:flex-row gap-3">
    <input
      id="search-input"
      type="text"
      placeholder="Ofis adı, kiracı, lokasyon..."
      class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
      hx-get="/htmx/offices"
      hx-trigger="keyup changed delay:300ms, search"
      hx-target="#office-grid"
      hx-include="#location-select, #search-input"
      name="search"
    />
    <select
      id="location-select"
      name="location"
      class="bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 md:w-60"
      hx-get="/htmx/offices"
      hx-trigger="change"
      hx-target="#office-grid"
      hx-include="#search-input, #location-select"
    >
      <option value="">Tüm Lokasyonlar</option>
      {% for loc in locations %}
      <option value="{{ loc }}">{{ loc }}</option>
      {% endfor %}
    </select>
    <button
      class="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-6 py-3 rounded-xl transition"
      hx-get="/htmx/offices"
      hx-target="#office-grid"
      hx-include="#search-input, #location-select"
    >
      Ara
    </button>
  </div>
</div>

<!-- Results -->
<div id="office-grid"
  hx-get="/htmx/offices"
  hx-trigger="load"
>
  <div class="text-center text-slate-500 py-20">Yükleniyor...</div>
</div>

{% endblock %}
