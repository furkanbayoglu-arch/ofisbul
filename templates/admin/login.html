{% extends "base.html" %}
{% block title %}Admin Giriş | OfisArama v2{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-3xl border border-slate-800 bg-slate-900 p-8 shadow-2xl">
  <h1 class="mb-2 text-2xl font-bold text-white">Admin Giriş</h1>
  <p class="mb-6 text-sm text-slate-400">Yönetim paneline erişmek için giriş yapın.</p>

  {% if error %}
  <div class="mb-4 rounded-xl border border-red-800 bg-red-950/40 px-4 py-3 text-sm text-red-300">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/admin/login" class="space-y-4">
    <input type="email" name="email" placeholder="E-posta" required
           class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
    <input type="password" name="password" placeholder="Şifre" required
           class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
    <button type="submit"
            class="w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-500">
      Giriş Yap
    </button>
  </form>
</div>
{% endblock %}
