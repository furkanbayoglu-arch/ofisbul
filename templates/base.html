<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OfisArama v2{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .office-card:hover { transform: translateY(-2px); }
    .office-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-950 font-sans text-slate-100">
  <nav class="sticky top-0 z-50 border-b border-slate-800 bg-slate-900/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="/" class="text-xl font-bold tracking-tight text-white">
        Ofis<span class="text-blue-400">Arama</span>
        <span class="ml-2 rounded-full bg-blue-600 px-2 py-0.5 align-middle text-xs text-white">v2</span>
      </a>
      <div class="flex items-center gap-4 text-sm text-slate-400">
        <a href="/" class="transition hover:text-white">Ofisler</a>
        <a href="/admin" class="transition hover:text-white">Admin</a>
        <a href="/docs" target="_blank" class="transition hover:text-white">API Docs</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-7xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-16 border-t border-slate-800 py-8 text-center text-sm text-slate-500">
    OfisArama v2 &mdash; İstanbul ofis veritabanı
  </footer>
</body>
</html>
