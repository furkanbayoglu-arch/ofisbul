<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OfisArama v2{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none; }
    .office-card:hover { transform: translateY(-2px); }
    .office-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

  <!-- Navbar -->
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight text-white">
        Ofis<span class="text-blue-400">Arama</span>
        <span class="ml-2 text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full align-middle">v2</span>
      </a>
      <div class="flex items-center gap-4 text-sm text-slate-400">
        <a href="/" class="hover:text-white transition">Ofisler</a>
        <a href="/api/docs" target="_blank" class="hover:text-white transition">API Docs</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-800 mt-16 py-8 text-center text-slate-500 text-sm">
    OfisArama v2 &mdash; İstanbul ofis veritabanı
  </footer>

</body>
</html>
