<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OfisBul{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .office-card:hover { transform: translateY(-2px); }
    .office-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    #map { z-index: 1; }
    .leaflet-popup-content-wrapper {
      background: #1e293b; color: #f1f5f9;
      border: 1px solid #334155; border-radius: 12px;
    }
    .leaflet-popup-tip { background: #1e293b; }
    .leaflet-popup-close-button { color: #94a3b8 !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

  <nav class="border-b border-slate-800 bg-slate-900/90 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight text-white">
        Ofis<span class="text-blue-400">Bul</span>
      </a>
      <div class="flex items-center gap-4 text-sm text-slate-400">
        <a href="/" class="hover:text-white transition">Ofisler</a>
        <a href="/docs" target="_blank" class="hover:text-white transition">API</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-800 mt-16 py-8 text-center text-slate-500 text-sm">
    OfisBul &mdash; İstanbul ofis veritabanı
  </footer>

</body>
</html>
